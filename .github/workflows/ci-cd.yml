name: CI-CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # ✅ FIX 1: Set MLflow safe environment (IMPORTANT)
    - name: Set MLflow environment
      run: echo "MLFLOW_TRACKING_URI=mlruns" >> $GITHUB_ENV

    # Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install httpx

    # Train model (creates artifacts/model.pkl)
    - name: Train model
      run: |
        python -m src.pipeline.training_pipeline

    # Run tests
    - name: Run tests
      run: |
        python -m pytest -v

    # Build Docker image
    - name: Build Docker image
      run: |
        docker build -t house-price-mlops .